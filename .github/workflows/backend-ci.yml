name: Backend CI Pipeline

# 1. Trigger: When should this workflow run?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. Jobs: What tasks should be executed?
jobs:
  build-and-test:
    # 3. Environment: What OS should it run on?
    runs-on: ubuntu-latest

    # We specify that our backend code is inside the 'backend' folder
    defaults:
      run:
        working-directory: ./backend

    steps:
      # Step 1: Get the code from the GitHub repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Install Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x' # We use a stable LTS version
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      # Step 3: Install dependencies
      - name: Install Dependencies
        run: npm ci

      # Step 4: Generate Prisma Client (Required before building TypeScript)
      - name: Generate Prisma Client
        run: npx prisma generate

      # Step 5: Compile TypeScript to JavaScript (Check for syntax/type errors)
      - name: Build Backend
        run: npm run build